<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1024px;
        height: 1024px;
        background: transparent;
        overflow: hidden;
      }
      /* G2 圆角方块（squircle），和 App 圆角同款 */
      .tile {
        position: absolute;
        left: 92px;
        top: 92px;
        width: 840px;
        height: 840px;
        border-radius: 188px;
        corner-shape: squircle;
        background: linear-gradient(155deg, #43434c 0%, #1f1f24 50%, #0d0d0f 100%);
        display: grid;
        place-items: center;
        overflow: hidden;
      }
      /* 边缘高光 + 底部压暗，做出立体感 */
      .tile::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        corner-shape: squircle;
        box-shadow: inset 0 5px 10px rgba(255, 255, 255, 0.12), inset 0 -18px 44px rgba(0, 0, 0, 0.4);
        pointer-events: none;
      }
      /* 主体「译」 */
      .glyph {
        font-family: 'PingFang SC', -apple-system, sans-serif;
        font-weight: 600;
        font-size: 520px;
        line-height: 1;
        color: #ffffff;
        transform: translate(-12px, 14px);
      }
      /* 右上角星芒 = 闪 / Glint */
      .glint {
        position: absolute;
        width: 196px;
        height: 196px;
        top: 96px;
        right: 100px;
        filter: drop-shadow(0 0 26px rgba(255, 255, 255, 0.6));
      }
    </style>
  </head>
  <body>
    <div class="tile">
      <span class="glyph">译</span>
      <svg class="glint" viewBox="0 0 100 100">
        <path
          d="M50 1 C53.5 36 64 46.5 99 50 C64 53.5 53.5 64 50 99 C46.5 64 36 53.5 1 50 C36 46.5 46.5 36 50 1 Z"
          fill="#ffffff"
        />
      </svg>
    </div>
  </body>
</html>
