<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'" />
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="translator.css" />
    <link rel="stylesheet" href="vendor/katex/katex.min.css" />
  </head>
  <body>
    <div class="app">
      <div class="titlebar">
        <span class="logo">译</span>
        <span class="spacer"></span>
        <button id="settings" class="iconbtn" title="设置">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3.2"></circle>
            <path d="M19.1 14.6a1.5 1.5 0 0 0 .3 1.65l.05.05a1.8 1.8 0 1 1-2.55 2.55l-.05-.05a1.5 1.5 0 0 0-1.65-.3 1.5 1.5 0 0 0-.9 1.37v.13a1.8 1.8 0 0 1-3.6 0v-.07a1.5 1.5 0 0 0-.98-1.37 1.5 1.5 0 0 0-1.65.3l-.05.05A1.8 1.8 0 1 1 4.7 16.4l.05-.05a1.5 1.5 0 0 0 .3-1.65 1.5 1.5 0 0 0-1.37-.9h-.13a1.8 1.8 0 0 1 0-3.6h.07a1.5 1.5 0 0 0 1.37-.98 1.5 1.5 0 0 0-.3-1.65l-.05-.05A1.8 1.8 0 1 1 7.6 4.7l.05.05a1.5 1.5 0 0 0 1.65.3H9.4a1.5 1.5 0 0 0 .9-1.37v-.13a1.8 1.8 0 0 1 3.6 0v.07a1.5 1.5 0 0 0 .9 1.37 1.5 1.5 0 0 0 1.65-.3l.05-.05a1.8 1.8 0 1 1 2.55 2.55l-.05.05a1.5 1.5 0 0 0-.3 1.65V9.4a1.5 1.5 0 0 0 1.37.9h.13a1.8 1.8 0 0 1 0 3.6h-.07a1.5 1.5 0 0 0-1.37.9z"></path>
          </svg>
        </button>
        <button id="pin" class="iconbtn" title="钉住窗口（开启后切到别的应用也不消失）">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="9" r="3.4"></circle>
            <line x1="12" y1="12.4" x2="12" y2="20"></line>
          </svg>
        </button>
        <button id="close" class="iconbtn" title="关闭 (Esc)">✕</button>
      </div>

      <div class="body">
        <textarea
          id="input"
          class="input"
          placeholder="输入或粘贴文字，回车翻译（Shift+回车换行）…"
          spellcheck="false"
        ></textarea>

        <div class="toolbar">
          <button id="speak-input" class="iconbtn" title="朗读原文">
            <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 5 6 9H3v6h3l5 4z"></path>
              <path d="M15.5 8.5a5 5 0 0 1 0 7"></path>
            </svg>
          </button>
          <span id="langtag" class="langtag">自动</span>
          <span class="arrow">→</span>
          <span class="targetwrap" title="翻译目标语言（选「自动」按输入智能判断方向）">
            <select id="target-lang" class="targetsel"></select>
          </span>
          <span class="spacer"></span>
          <button id="stop" class="ghost" hidden>停止</button>
          <button id="retry" class="ghost" hidden>重试</button>
          <button id="translate" class="primary">翻译</button>
        </div>

        <div id="status" class="status"></div>
        <div id="result" class="result"></div>

        <div id="resultbar" class="resultbar" hidden>
          <button id="speak-result" class="iconbtn" title="朗读译文">
            <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 5 6 9H3v6h3l5 4z"></path>
              <path d="M15.5 8.5a5 5 0 0 1 0 7"></path>
            </svg>
          </button>
          <span class="spacer"></span>
          <button id="copy-plain" class="ghost">复制纯文本</button>
          <button id="copy" class="ghost">复制译文</button>
        </div>
      </div>
    </div>

    <script src="translator.js"></script>
  </body>
</html>
